name: nuxt-admin-learning

x-app-image: &app-image
  image: nuxt-admin-learning:latest
  build:
    context: .
    dockerfile: Dockerfile

services:
  mysql:
    image: mysql:8.4
    container_name: nuxt-admin-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env.production}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?set MYSQL_DATABASE in .env.production}
      MYSQL_USER: ${MYSQL_USER:?set MYSQL_USER in .env.production}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env.production}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: nuxt-admin-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    <<: *app-image
    container_name: nuxt-admin-migrate
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env.production}
    depends_on:
      mysql:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]

  app:
    <<: *app-image
    container_name: nuxt-admin-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env.production}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL in .env.production}
      NUXT_AI_API_KEY: ${NUXT_AI_API_KEY:?set NUXT_AI_API_KEY in .env.production}
      NUXT_AI_BASE_URL: ${NUXT_AI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      NUXT_AI_MODEL: ${NUXT_AI_MODEL:-qwen-plus}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: nuxt-admin-caddy
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN in .env.production}
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  mysql-data:
  redis-data:
  caddy-data:
  caddy-config:
